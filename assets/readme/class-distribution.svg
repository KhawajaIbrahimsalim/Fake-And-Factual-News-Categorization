<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="360" rx="28" fill="#F8FAFC"/>
  <text x="60" y="62" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Class Distribution</text>
  <text x="60" y="92" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="18">The dataset is almost perfectly balanced, which helps keep evaluation honest.</text>

  <rect x="80" y="150" width="1040" height="54" rx="27" fill="#E2E8F0"/>
  <rect x="80" y="150" width="525.25" height="54" rx="27" fill="#0F766E"/>
  <rect x="605.25" y="150" width="514.75" height="54" rx="27" fill="#BE123C"/>

  <text x="96" y="183" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">Factual News: 100</text>
  <text x="912" y="183" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">Fake News: 98</text>

  <rect x="80" y="234" width="220" height="72" rx="22" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="104" y="264" fill="#065F46" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">FACTUAL SHARE</text>
  <text x="104" y="291" fill="#064E3B" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">50.5%</text>

  <rect x="324" y="234" width="220" height="72" rx="22" fill="#FFF1F2" stroke="#FDA4AF"/>
  <text x="348" y="264" fill="#9F1239" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">FAKE SHARE</text>
  <text x="348" y="291" fill="#881337" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">49.5%</text>

  <rect x="568" y="234" width="270" height="72" rx="22" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="592" y="264" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">TOTAL SAMPLES</text>
  <text x="592" y="291" fill="#1E3A8A" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">198</text>

  <rect x="862" y="234" width="258" height="72" rx="22" fill="#FFFBEB" stroke="#FDE68A"/>
  <text x="886" y="264" fill="#B45309" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">INTERPRETATION</text>
  <text x="886" y="291" fill="#92400E" font-family="Segoe UI, Arial, sans-serif" font-size="15">Accuracy is less likely to be inflated by class imbalance.</text>
</svg>
