<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#24556B"/>
    </marker>
  </defs>

  <rect width="1200" height="420" rx="28" fill="#F2F7FA"/>
  <text x="60" y="62" fill="#102A43" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">End-to-End Pipeline</text>
  <text x="60" y="92" fill="#486581" font-family="Segoe UI, Arial, sans-serif" font-size="18">From raw article text to an interactive prediction in Streamlit.</text>

  <rect x="60" y="140" width="180" height="180" rx="22" fill="url(#panel)" stroke="#CBD5E1"/>
  <text x="84" y="178" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">1. Input Data</text>
  <text x="84" y="212" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">- News title</text>
  <text x="84" y="236" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">- Article text</text>
  <text x="84" y="260" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">- Date field</text>
  <text x="84" y="284" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">- Label: fake_or_factual</text>
  <text x="84" y="308" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">198 labeled samples</text>

  <rect x="286" y="140" width="180" height="180" rx="22" fill="url(#panel)" stroke="#CBD5E1"/>
  <text x="310" y="178" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">2. Preprocess</text>
  <text x="310" y="212" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">- Regex cleanup</text>
  <text x="310" y="236" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">- Lowercasing</text>
  <text x="310" y="260" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">- Punctuation removal</text>
  <text x="310" y="284" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">- Stopword filtering</text>
  <text x="310" y="308" fill="#0F766E" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Lightweight deployment path</text>

  <rect x="512" y="140" width="180" height="180" rx="22" fill="url(#panel)" stroke="#CBD5E1"/>
  <text x="536" y="178" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">3. Vectorize</text>
  <text x="536" y="212" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">- CountVectorizer</text>
  <text x="536" y="236" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">- Sparse bag of words</text>
  <text x="536" y="260" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">- Learned vocabulary</text>
  <text x="536" y="284" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">- Consistent train/infer space</text>
  <text x="536" y="308" fill="#B45309" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">9,049-token vocabulary</text>

  <rect x="738" y="140" width="180" height="180" rx="22" fill="url(#panel)" stroke="#CBD5E1"/>
  <text x="762" y="178" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">4. Classify</text>
  <text x="762" y="212" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">- Logistic Regression</text>
  <text x="762" y="236" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">- max_iter = 1000</text>
  <text x="762" y="260" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">- Predict label</text>
  <text x="762" y="284" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">- Predict confidence</text>
  <text x="762" y="308" fill="#BE123C" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">87.5% holdout accuracy</text>

  <rect x="964" y="140" width="176" height="180" rx="22" fill="url(#panel)" stroke="#CBD5E1"/>
  <text x="988" y="178" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">5. Deliver</text>
  <text x="988" y="212" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">- Streamlit UI</text>
  <text x="988" y="236" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">- Sample inputs</text>
  <text x="988" y="260" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">- Processed tokens view</text>
  <text x="988" y="284" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">- Interactive demos</text>
  <text x="988" y="308" fill="#7C3AED" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Ready for GitHub showcase</text>

  <line x1="240" y1="230" x2="286" y2="230" stroke="#24556B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="466" y1="230" x2="512" y2="230" stroke="#24556B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="692" y1="230" x2="738" y2="230" stroke="#24556B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="918" y1="230" x2="964" y2="230" stroke="#24556B" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
